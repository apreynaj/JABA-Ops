<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JABA Ops Tracker</title>
<style>
:root {
  --bg:#F7F7F5; --surface:#FFFFFF; --surface2:#F1F0ED; --border:#E4E2DC; --text:#1A1916;
  --text2:#6B6860; --text3:#9A9890; --font:'Inter',system-ui,-apple-system,sans-serif;
  --radius:8px; --radius-lg:12px;
  --c-ns-bg:#F1F0ED; --c-ns-fg:#6B6860; --c-ns-dot:#9A9890;
  --c-design-bg:#EEF0FF; --c-design-fg:#3D45B0; --c-design-dot:#3D45B0;
  --c-dev-bg:#E8F4FD; --c-dev-fg:#1565A0; --c-dev-dot:#1565A0;
  --c-review-bg:#FFF3E0; --c-review-fg:#A65A00; --c-review-dot:#E88C00;
  --c-done-bg:#EDFAF0; --c-done-fg:#1B6B35; --c-done-dot:#2E9550;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh}

/* Sidebar */
.sidebar{position:fixed;top:0;left:0;width:224px;height:100vh;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;z-index:10;overflow-y:auto}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.logo-mark{width:28px;height:28px;background:var(--text);border-radius:6px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
.logo-mark svg{width:14px;height:14px}
.sidebar-logo h1{font-size:14px;font-weight:600;letter-spacing:-0.3px}
.sidebar-logo p{font-size:11px;color:var(--text3);margin-top:2px}
.sidebar-nav{padding:10px 10px;flex:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text3);padding:0 10px;margin:14px 0 4px}
.nav-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;font-size:13px;color:var(--text2);cursor:pointer;border:none;background:none;width:100%;font-family:var(--font);text-align:left;transition:background .1s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--surface2);color:var(--text);font-weight:500}
.nav-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sidebar-footer{padding:14px 20px;border-top:1px solid var(--border);flex-shrink:0}
.prog-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text3);margin-bottom:6px;font-weight:500}
.prog-track{height:4px;background:var(--surface2);border-radius:4px;overflow:hidden}
.prog-fill{height:100%;background:var(--c-done-dot);border-radius:4px;transition:width .4s ease}

/* Main */
.main{margin-left:224px;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:5;gap:12px;flex-wrap:wrap}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar h2{font-size:15px;font-weight:600;letter-spacing:-0.3px}
.view-toggle{display:flex;background:var(--surface2);border-radius:6px;padding:3px;gap:2px}
.vt-btn{padding:5px 11px;font-size:12px;border:none;background:none;color:var(--text2);cursor:pointer;border-radius:4px;font-family:var(--font);font-weight:500;display:flex;align-items:center;gap:4px;white-space:nowrap}
.vt-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
.topbar-right{display:flex;align-items:center;gap:8px}
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 13px;border-radius:var(--radius);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--font);transition:all .1s;white-space:nowrap}
.btn:hover{background:var(--surface2)}
.btn-dark{background:var(--text);color:#fff;border-color:var(--text)}
.btn-dark:hover{background:#333}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-icon{padding:5px 7px;border-radius:6px}
.content{padding:24px 28px}

/* Stats */
.stats{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;margin-bottom:20px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:13px 15px}
.stat-n{font-size:24px;font-weight:600;letter-spacing:-1px;line-height:1}
.stat-l{font-size:11px;color:var(--text3);margin-top:3px;font-weight:500}
.stat-bar{height:2px;background:var(--border);border-radius:2px;margin-top:10px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:2px;transition:width .3s}

/* Filters */
.filters{display:flex;align-items:center;gap:8px;margin-bottom:16px;flex-wrap:wrap}
.filter-select{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:6px 10px;font-size:12px;color:var(--text);font-family:var(--font);cursor:pointer}
.search-wrap{position:relative;flex:1;max-width:260px}
.search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);pointer-events:none}
.search-input{width:100%;padding:6px 10px 6px 30px;border:1px solid var(--border);border-radius:var(--radius);font-size:12px;font-family:var(--font);background:var(--surface);color:var(--text)}
.search-input:focus,.filter-select:focus{outline:2px solid var(--text);outline-offset:1px}

/* Badges */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:500;white-space:nowrap}
.badge::before{content:'';width:5px;height:5px;border-radius:50%;display:inline-block}
.s-notstarted{background:var(--c-ns-bg);color:var(--c-ns-fg)}.s-notstarted::before{background:var(--c-ns-dot)}
.s-design{background:var(--c-design-bg);color:var(--c-design-fg)}.s-design::before{background:var(--c-design-dot)}
.s-dev{background:var(--c-dev-bg);color:var(--c-dev-fg)}.s-dev::before{background:var(--c-dev-dot)}
.s-review{background:var(--c-review-bg);color:var(--c-review-fg)}.s-review::before{background:var(--c-review-dot)}
.s-done{background:var(--c-done-bg);color:var(--c-done-fg)}.s-done::before{background:var(--c-done-dot)}
.p-week{background:#FEF0F0;color:#991B1B}.p-week::before{background:#EF4444}
.p-next{background:#FFFBEB;color:#92400E}.p-next::before{background:#F59E0B}
.p-hold{background:var(--surface2);color:var(--text2)}.p-hold::before{background:var(--text3)}
.owner-chip{display:inline-flex;align-items:center;justify-content:center;width:26px;height:26px;border-radius:50%;background:var(--surface2);border:1.5px solid var(--border);font-size:11px;font-weight:600;color:var(--text2);flex-shrink:0}
.link-btn{display:inline-flex;align-items:center;gap:4px;color:#1565A0;font-size:12px;font-weight:500;text-decoration:none;padding:3px 8px;border-radius:5px;background:#E8F4FD}
.link-btn:hover{background:#D0E8F8}

/* Table */
.tbl-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow-x:auto;overflow-y:visible}
table{width:100%;border-collapse:collapse;table-layout:fixed}
thead{background:var(--surface2)}
th{padding:10px 14px;font-size:11px;font-weight:600;color:var(--text3);text-align:left;border-bottom:1px solid var(--border);letter-spacing:.04em;text-transform:uppercase;white-space:nowrap}
td{padding:11px 14px;font-size:13px;border-bottom:1px solid var(--border);vertical-align:middle;overflow:hidden}
td.td-badge{overflow:visible}
tr:last-child td{border-bottom:none}
tr:hover td{background:#FAFAF8}
tbody tr{cursor:pointer}
.page-name{font-weight:500;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.parent-tag{font-size:11px;color:var(--text3);background:var(--surface2);padding:2px 7px;border-radius:4px;display:inline-block}
.notes-cell{display:block;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;color:var(--text2)}
.t-bug{background:#FEF0F0;color:#991B1B}.t-bug::before{background:#EF4444}
.t-improvement{background:#EEF0FF;color:#3D45B0}.t-improvement::before{background:#3D45B0}
.t-new{background:#EDFAF0;color:#1B6B35}.t-new::before{background:#2E9550}
/* Inline dropdown */
.inline-select-wrap{position:relative;display:inline-block}
.inline-dropdown{position:absolute;top:calc(100% + 4px);left:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:200;min-width:160px;overflow:hidden;display:none}
.inline-dropdown.open{display:block}
.inline-dropdown-opt{padding:8px 12px;font-size:12px;cursor:pointer;color:var(--text);display:flex;align-items:center;gap:7px}
.inline-dropdown-opt:hover{background:var(--surface2)}
.inline-dropdown-opt.active{font-weight:600}
.inline-dropdown-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.row-actions{display:flex;align-items:center;gap:3px;opacity:0;transition:opacity .15s;flex-shrink:0;white-space:nowrap}
tr:hover .row-actions{opacity:1}
.row-btn{background:none;border:1px solid var(--border);border-radius:5px;padding:3px 6px;cursor:pointer;font-size:10px;font-weight:500;display:flex;align-items:center;gap:2px;color:var(--text2);font-family:var(--font);white-space:nowrap}
.row-btn:hover{background:var(--surface2)}
.row-btn-del{border-color:#FECACA;color:#B91C1C}
.row-btn-del:hover{background:#FEF2F2}
/* Clickable badges */
.badge-btn{cursor:pointer;transition:opacity .1s;user-select:none}
.badge-btn:hover{opacity:0.75}

/* Kanban */
.kanban{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;align-items:start}
.k-col{background:var(--surface2);border-radius:var(--radius-lg);padding:12px;min-height:160px}
.k-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.k-col-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.k-col-count{font-size:11px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:1px 7px;color:var(--text2);font-weight:600}
.k-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:11px 12px;margin-bottom:7px;cursor:pointer;transition:box-shadow .1s,transform .1s}
.k-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.07);transform:translateY(-1px)}
.k-card:last-child{margin-bottom:0}
.k-card-name{font-size:13px;font-weight:500;margin-bottom:2px;line-height:1.3}
.k-card-parent{font-size:11px;color:var(--text3);margin-bottom:9px}
.k-card-footer{display:flex;align-items:center;justify-content:space-between;gap:4px}
.k-empty{text-align:center;padding:20px 0;font-size:12px;color:var(--text3)}

/* Group views */
.group-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px}
.group-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.group-card-header{padding:14px 16px 10px;display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.group-card-title{font-size:14px;font-weight:600;letter-spacing:-0.2px}
.group-card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.group-progress-wrap{padding:0 16px 12px}
.group-progress-track{height:6px;background:var(--surface2);border-radius:6px;overflow:hidden;display:flex;gap:1px}
.group-progress-seg{height:100%;transition:width .3s}
.group-progress-labels{display:flex;gap:10px;margin-top:7px;flex-wrap:wrap}
.group-progress-label{font-size:11px;color:var(--text2);display:flex;align-items:center;gap:4px}
.group-rows{border-top:1px solid var(--border)}
.group-row{display:flex;align-items:center;justify-content:space-between;padding:9px 16px;border-bottom:1px solid var(--border);cursor:pointer;gap:8px;transition:background .1s}
.group-row:last-child{border-bottom:none}
.group-row:hover{background:var(--surface2)}
.group-row-name{font-size:13px;font-weight:500;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.group-row-meta{display:flex;align-items:center;gap:6px;flex-shrink:0}

/* Modals */
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:50;align-items:flex-start;justify-content:center;padding:40px 20px;overflow-y:auto}
.modal-bg.open{display:flex}
.modal{background:var(--surface);border-radius:var(--radius-lg);width:100%;max-width:580px;box-shadow:0 20px 60px rgba(0,0,0,.15);overflow:hidden}
.modal-header{padding:20px 24px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-size:15px;font-weight:600}
.modal-close{background:none;border:none;cursor:pointer;color:var(--text3);padding:4px;border-radius:4px;display:flex}
.modal-close:hover{background:var(--surface2);color:var(--text)}
.modal-body{padding:20px 24px;max-height:75vh;overflow-y:auto}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.form-full{grid-column:1/-1}
.form-group{display:flex;flex-direction:column;gap:5px}
.form-group label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.form-group input,.form-group select,.form-group textarea{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:8px 11px;font-size:13px;color:var(--text);font-family:var(--font);width:100%}
.form-group select:disabled{color:var(--text3);cursor:not-allowed}
.combo-wrap{position:relative}
.combo-dropdown{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:0 8px 24px rgba(0,0,0,.1);z-index:100;max-height:180px;overflow-y:auto;display:none}
.combo-dropdown.open{display:block}
.combo-option{padding:8px 12px;font-size:13px;cursor:pointer;color:var(--text)}
.combo-option:hover{background:var(--surface2)}
.combo-option.add-new{color:#1565A0;font-weight:500;border-top:1px solid var(--border)}
.form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:2px solid var(--text);outline-offset:1px;background:var(--surface)}
.form-group textarea{resize:vertical;min-height:80px;line-height:1.5}
.modal-footer{padding:16px 24px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:flex-end;gap:8px}
.btn-delete{color:#B91C1C;border-color:#FECACA;background:#FEF2F2;margin-right:auto}
.btn-delete:hover{background:#FEE2E2}
.divider{height:1px;background:var(--border);margin:4px 0}

/* Screenshots */
.drop-zone{border:1.5px dashed var(--border);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:all .15s;background:var(--bg)}
.drop-zone:hover,.drop-zone.dragover{border-color:var(--text);background:var(--surface2)}
.drop-zone p{font-size:13px;color:var(--text3);margin-top:6px}
.drop-zone svg{color:var(--text3)}
.screenshots-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:10px}
.screenshot-thumb{position:relative;border-radius:6px;overflow:hidden;aspect-ratio:16/9;background:var(--surface2);border:1px solid var(--border)}
.screenshot-thumb img{width:100%;height:100%;object-fit:cover;cursor:pointer}
.del-shot{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.6);border:none;border-radius:4px;padding:3px 5px;cursor:pointer;display:flex;align-items:center;color:#fff;opacity:0;transition:opacity .15s}
.screenshot-thumb:hover .del-shot{opacity:1}
.uploading-indicator{font-size:12px;color:var(--text3);display:flex;align-items:center;gap:6px;margin-top:8px}

/* Lightbox */
.lightbox{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:200;align-items:center;justify-content:center;padding:20px}
.lightbox.open{display:flex}
.lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:fixed;top:20px;right:24px;background:none;border:none;color:#fff;font-size:28px;cursor:pointer;line-height:1}

/* Sync */
.sync-dot{width:7px;height:7px;border-radius:50%;background:#9A9890;display:inline-block;margin-right:5px;transition:background .3s}
.sync-dot.syncing{background:#F59E0B}
.sync-dot.synced{background:#2E9550}
.sync-dot.error{background:#EF4444}
.sync-label{font-size:11px;color:var(--text3);display:flex;align-items:center}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg)}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty-state h3{font-size:15px;font-weight:600;margin-bottom:6px}
.empty-state p{font-size:13px;color:var(--text2);max-width:320px;margin:0 auto 16px;line-height:1.5}

/* ── Manage Pages panel ── */
.manage-wrap{max-width:680px}
.manage-section-title{font-size:15px;font-weight:600;margin-bottom:4px;letter-spacing:-0.2px}
.manage-section-sub{font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.5}
.parent-list{display:flex;flex-direction:column;gap:12px}
.parent-block{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden}
.parent-block-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;background:var(--surface2);border-bottom:1px solid var(--border)}
.parent-block-name{font-size:13px;font-weight:600;color:var(--text)}
.parent-block-actions{display:flex;gap:6px}
.subpage-list{padding:8px 16px 12px}
.subpage-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text)}
.subpage-row:last-child{border-bottom:none}
.subpage-row-name{flex:1}
.add-subpage-row{display:flex;gap:8px;margin-top:10px}
.add-subpage-row input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);padding:7px 10px;font-size:13px;color:var(--text);font-family:var(--font)}
.add-subpage-row input:focus{outline:2px solid var(--text);outline-offset:1px;background:var(--surface)}
.add-parent-row{display:flex;gap:8px;margin-top:16px}
.add-parent-row input{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:8px 12px;font-size:13px;color:var(--text);font-family:var(--font)}
.add-parent-row input:focus{outline:2px solid var(--text);outline-offset:1px}
.empty-subpages{font-size:12px;color:var(--text3);padding:8px 0;font-style:italic}
.hold-toggle{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text2);cursor:pointer;padding:4px 0}
.hold-toggle input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:#E88C00}
.badge-hold{background:#FFF3E0;color:#A65A00;border:1px solid #F5D8A8;display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:999px;font-size:11px;font-weight:600}
.card-hold-banner{background:#FFF8EC;border-bottom:1px solid #F5D8A8;padding:7px 16px;display:flex;align-items:center;gap:6px;font-size:12px;color:#A65A00;font-weight:500}
.btn-ghost{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;border-radius:4px;display:flex;align-items:center}
.btn-ghost:hover{color:#B91C1C;background:#FEF2F2}
.btn-ghost-blue{background:none;border:none;cursor:pointer;color:var(--text3);padding:3px;border-radius:4px;display:flex;align-items:center}

@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:1100px){.stats{grid-template-columns:repeat(3,1fr)}.kanban{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.sidebar{width:52px}.sidebar-logo h1,.sidebar-logo p,.nav-item span,.nav-label{display:none}.main{margin-left:52px}.stats{grid-template-columns:repeat(2,1fr)}.kanban{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.content{padding:16px}.topbar{padding:12px 16px}.kanban{grid-template-columns:1fr}.stats{grid-template-columns:repeat(2,1fr)}.group-grid{grid-template-columns:1fr}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sidebar-logo">
    <div class="logo-mark">
      <svg viewBox="0 0 14 14" fill="none"><rect x="1" y="1" width="5" height="5" rx="1" fill="white"/><rect x="8" y="1" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="1" y="8" width="5" height="5" rx="1" fill="white" opacity=".6"/><rect x="8" y="8" width="5" height="5" rx="1" fill="white" opacity=".3"/></svg>
    </div>
    <h1>JABA Ops</h1>
    <p>Dashboard tracker</p>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-label">Views</div>
    <button class="nav-item active" onclick="switchNav('all',this)">
      <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      <span>All pages</span>

  e.stopPropagation();

  document.querySelectorAll('.inline-dropdown.open').forEach(d=>d.classList.remove('open'));

  if(!dd){
    dd=document.createElement('div');

    dd.innerHTML=options.map(o=>`
      <div class="inline-dropdown-opt${o===current?' active':''}" onclick="pickInline(event,'${id}','${field}','${o}')">

    wrap.appendChild(dd);

    setTimeout(()=>document.addEventListener('click',()=>dd.classList.remove('open'),{once:true}),0);

}

function setSync(state,text){
  document.getElementById('sync-dot').className='sync-dot '+state;
  document.getElementById('sync-text').textContent=text;
}
async function dbFetch(url,opts={}){
  const r=await fetch(url,{headers:HEADERS,...opts});
  if(!r.ok) throw new Error(await r.text());
  const text=await r.text();
  if(!text||text.trim()==='') return null;
  return JSON.parse(text);
}

async function bootstrap(){
  // silently ensure columns exist — handled via SQL migrations in Supabase
  return;
}

async function load(){
  setSync('syncing','Loading…');
  try{
    await bootstrap();
    const [pageData, structData] = await Promise.all([
      dbFetch(`${API}?order=updated.desc`),
      dbFetch(`${STRUCT_API}?order=parent.asc`)
    ]);
    items = pageData||[];
    ownersList=[...new Set(items.map(i=>i.owner).filter(Boolean))].sort();
    pageStructure = {};
    (structData||[]).forEach(row=>{ pageStructure[row.parent]={subpages:row.subpages||[], onHold:row.on_hold||false}; });
    setSync('synced','Synced');
    render();
  }catch(e){
    setSync('error','Error loading');
    console.error(e);
    // fallback: load items only
    try{ items=await dbFetch(`${API}?order=updated.desc`); render(); }catch(e2){}
  }
}

// ── Page structure CRUD ──
async function saveStructure(parent, subpages, onHold){
  if(onHold===undefined) onHold=pageStructure[parent]?.onHold||false;
  const existing = await dbFetch(`${STRUCT_API}?parent=eq.${encodeURIComponent(parent)}`);
  if(existing&&existing.length){
    await dbFetch(`${STRUCT_API}?parent=eq.${encodeURIComponent(parent)}`,{
      method:'PATCH',
      body:JSON.stringify({subpages, on_hold:onHold}),
      headers:{...HEADERS,'Prefer':'return=minimal'}
    });
  } else {
    await dbFetch(STRUCT_API,{
      method:'POST',
      body:JSON.stringify({parent,subpages, on_hold:onHold}),
      headers:{...HEADERS,'Prefer':'return=minimal'}
    });
  }
  pageStructure[parent]={subpages, onHold};
}

async function deleteParent(parent){
  await dbFetch(`${STRUCT_API}?parent=eq.${encodeURIComponent(parent)}`,{
    method:'DELETE',headers:{...HEADERS,'Prefer':'return=minimal'}
  });
  delete pageStructure[parent];
}

async function addParent(){
  const inp=document.getElementById('new-parent-input');
  const val=inp.value.trim();
  if(!val) return;
  if(pageStructure[val]!==undefined){alert('That parent page already exists.');return;}
  setSync('syncing','Saving…');
  try{
    await saveStructure(val,[],false);
    setSync('synced','Saved ✓');
    inp.value='';
    renderManagePages();
  }catch(e){setSync('error','Save failed');console.error(e);}
}

async function addSubpage(parent){
  const inp=document.getElementById(`new-sub-${parent}`);
  const val=inp.value.trim();
  if(!val) return;
  const subs=[...(pageStructure[parent]?.subpages||[])];
  if(subs.includes(val)){alert('That sub-page already exists.');return;}
  subs.push(val);
  setSync('syncing','Saving…');
  try{
    await saveStructure(parent,subs);
    setSync('synced','Saved ✓');
    inp.value='';
    renderManagePages();
  }catch(e){setSync('error','Save failed');console.error(e);}
}

async function removeSubpage(parent,idx){
  const subs=[...(pageStructure[parent]?.subpages||[])];
  const name=subs[idx];
  if(!confirm(`Remove sub-page "${name}"?`)) return;
  subs.splice(idx,1);
  setSync('syncing','Saving…');
  try{
    await saveStructure(parent,subs);
    setSync('synced','Saved ✓');
    renderManagePages();
  }catch(e){setSync('error','Save failed');console.error(e);}
}

async function toggleParentHold(parent){
  const current=pageStructure[parent]?.onHold||false;
  const subs=pageStructure[parent]?.subpages||[];
  setSync('syncing','Saving…');
  try{
    await saveStructure(parent,subs,!current);
    setSync('synced','Saved ✓');
    renderManagePages();
  }catch(e){setSync('error','Save failed');console.error(e);}
}

async function removeParent(parent){
  if(!confirm(`Delete parent page "${parent}" and all its sub-pages from the structure?\n\nExisting entries won't be deleted.`)) return;
  setSync('syncing','Saving…');
  try{
    await deleteParent(parent);
    setSync('synced','Saved ✓');
    renderManagePages();
  }catch(e){setSync('error','Save failed');console.error(e);}
}

  if(!parent){
    subSel.innerHTML='<option value="">— Select parent page first —</option>';
    subSel.disabled=true;
    return;
  }
  const subs=(pageStructure[parent]?.subpages)||[];
  if(!subs.length){
    subSel.innerHTML='<option value="">No sub-pages defined yet</option>';
    subSel.disabled=true;
    return;
  }
  subSel.disabled=false;
  subSel.innerHTML='<option value="">— Select a sub-page —</option>'
    +subs.map(s=>`<option value="${esc(s)}">${esc(s)}</option>`).join('');
}

async function removeDuplicates(){
  const seen=new Map();
  const toDelete=[];
  // sort by updated desc so we keep the most recent of each duplicate group
  const sorted=[...items].sort((a,b)=>(b.updated||0)-(a.updated||0));
  sorted.forEach(i=>{
    const key=`${i.parent}|||${i.name}|||${(i.notes||'').trim().toLowerCase()}`;
    if(seen.has(key)) toDelete.push(i.id);
    else seen.set(key,i.id);
  });
  if(!toDelete.length){alert('No duplicates found.');return;}
  if(!confirm(`Found ${toDelete.length} duplicate entr${toDelete.length!==1?'ies':'y'} (same parent + sub-page + identical update text). Keep only the most recent of each and delete the rest?`)) return;
  setSync('syncing','Removing duplicates…');
  try{
    for(const id of toDelete){
      await dbFetch(`${API}?id=eq.${id}`,{method:'DELETE',headers:{...HEADERS,'Prefer':'return=minimal'}});
    }
    items=items.filter(i=>!toDelete.includes(i.id));
    setSync('synced',`Removed ${toDelete.length}`);
    render();
  }catch(e){setSync('error','Cleanup failed');console.error(e);}
}

async function saveItem(){
  const parent=document.getElementById('f-parent').value;
  const name=document.getElementById('f-name').value;
  if(!parent){document.getElementById('f-parent').style.outline='2px solid #EF4444';return;}
  if(!name){document.getElementById('f-name').style.outline='2px solid #EF4444';return;}
  document.getElementById('f-parent').style.outline='';
  document.getElementById('f-name').style.outline='';

  // Duplicate check — only for new entries, compares parent + sub-page + the actual update text
  if(!editingId){
    const notesVal=document.getElementById('f-notes').value.trim().toLowerCase();
    const dup=items.find(i=>i.parent===parent && i.name===name && (i.notes||'').trim().toLowerCase()===notesVal && notesVal!=='');
    if(dup){
      const proceed=confirm(`This exact update already exists for "${parent} → ${name}":\n\n"${dup.notes}"\n\n(status: ${dup.status})\n\nAdd it again anyway?`);
      if(!proceed) return;
    }
  }

  const ownerVal=document.getElementById('f-owner-input').value.trim();
  if(ownerVal&&!ownersList.includes(ownerVal)){ownersList.push(ownerVal);ownersList.sort();}
  const item={
    id:editingId||uid(),name,parent,
    owner:document.getElementById('f-owner-input').value.trim(),
    status:document.getElementById('f-status').value,
    priority:document.getElementById('f-priority-input').value,
    notes:document.getElementById('f-notes').value.trim(),
    screenshots:currentScreenshots,
    handoff:document.getElementById('f-handoff').value.trim(),
    type:document.getElementById('f-type').value,
    updated:Date.now()
  };
  setSync('syncing','Saving…');
  try{
    if(editingId){
      await dbFetch(`${API}?id=eq.${editingId}`,{method:'PATCH',body:JSON.stringify(item),headers:{...HEADERS,'Prefer':'return=minimal'}});
      const idx=items.findIndex(i=>i.id===editingId);if(idx>-1)items[idx]=item;
    } else {
      await dbFetch(API,{method:'POST',body:JSON.stringify(item),headers:{...HEADERS,'Prefer':'return=minimal'}});
      items.unshift(item);
    }
    setSync('synced','Saved ✓');closeModal();render();
  }catch(e){setSync('error','Save failed');console.error(e);}
}

async function deleteItem(){
  if(!editingId||!confirm('Delete this entry?')) return;
  setSync('syncing','Deleting…');
  try{
    await dbFetch(`${API}?id=eq.${editingId}`,{method:'DELETE',headers:{...HEADERS,'Prefer':'return=minimal'}});
    items=items.filter(i=>i.id!==editingId);
    setSync('synced','Deleted');closeModal();render();
  }catch(e){setSync('error','Delete failed');console.error(e);}
}

function handleDragOver(e){e.preventDefault();document.getElementById('drop-zone').classList.add('dragover');}
function handleDragLeave(){document.getElementById('drop-zone').classList.remove('dragover');}
function handleDrop(e){e.preventDefault();document.getElementById('drop-zone').classList.remove('dragover');handleFiles(e.dataTransfer.files);}
async function handleFiles(files){
  const ind=document.getElementById('uploading-indicator');ind.style.display='flex';
  for(const file of files){
    if(!file.type.startsWith('image/')) continue;
    const ext=file.name.split('.').pop();
    const path=`${uid()}.${ext}`;
    try{
      const r=await fetch(`${STORAGE}/object/Screenshots/${path}`,{
        method:'POST',
        headers:{'apikey':SUPABASE_KEY,'Authorization':`Bearer ${SUPABASE_KEY}`,'Content-Type':file.type,'x-upsert':'true'},
        body:file
      });
      if(!r.ok) throw new Error(await r.text());
      currentScreenshots.push(`${STORAGE}/object/public/Screenshots/${path}`);
      renderScreenshots();
    }catch(e){alert('Upload failed: '+e.message);}
  }
  ind.style.display='none';
}

  document.getElementById('screenshots-grid').innerHTML=currentScreenshots.map((url,i)=>`
    <div class="screenshot-thumb">

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

function getFiltered(){
  const fs=document.getElementById('f-status').value;
  const fp=document.getElementById('f-priority').value;
  const fo=document.getElementById('f-owner').value;
  const sq=(document.getElementById('search-input').value||'').toLowerCase();
  const navStatusFilter=STATUS_NAV[navFilter];
  document.getElementById('btn-clear-filters').style.display=(fs||fp||fo||sq)?'inline-flex':'none';
  return items.filter(i=>{
    if(navFilter==='week'&&i.priority!=='This Week') return false;
    if(navStatusFilter&&i.status!==navStatusFilter) return false;
    if(fs&&i.status!==fs) return false;
    if(fp&&i.priority!==fp) return false;
    if(fo&&i.owner!==fo) return false;
    if(sq&&!((i.name||'').toLowerCase().includes(sq)||(i.parent||'').toLowerCase().includes(sq)||(i.notes||'').toLowerCase().includes(sq))) return false;
    return true;
  });
}

function renderByPage(){
  const parents=Object.keys(pageStructure).sort();
  // also include parents from items not in structure
  items.forEach(i=>{if(i.parent&&!parents.includes(i.parent))parents.push(i.parent);});
  if(!parents.length){renderEmpty();return;}
  // Sort: active first, on hold last
  parents.sort((a,b)=>{
    const aHold=pageStructure[a]?.onHold||false;
    const bHold=pageStructure[b]?.onHold||false;
    if(aHold&&!bHold) return 1;
    if(!aHold&&bHold) return -1;
    return a.localeCompare(b);
  });
  document.getElementById('main-view').innerHTML=`<div class="group-grid">${parents.map(p=>groupCard(p,'page')).join('')}</div>`;
}

function renderByOwner(){
  const owners=[...new Set(items.map(i=>i.owner||'Unassigned'))].sort();
  if(!owners.length){renderEmpty();return;}
  document.getElementById('main-view').innerHTML=`<div class="group-grid">${owners.map(o=>groupCard(o,'owner')).join('')}</div>`;
}

function groupCard(groupKey,type){
  const groupItems=type==='page'?items.filter(i=>(i.parent||'')===groupKey):items.filter(i=>(i.owner||'Unassigned')===groupKey);
  const total=groupItems.length;
  const counts={};STATUS_ORDER.forEach(s=>counts[s]=0);
  groupItems.forEach(i=>{if(counts[i.status]!==undefined)counts[i.status]++;});
  const donePct=total?Math.round(counts['Done']/total*100):0;
  const ini=groupKey.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const isOnHold=type==='page'&&(pageStructure[groupKey]?.onHold||false);
  const segs=STATUS_ORDER.map(s=>{const w=total?counts[s]/total*100:0;return w>0?`<div class="group-progress-seg" style="width:${w}%;background:${STATUS_COLOR[s]}${isOnHold?';opacity:0.5':''}"></div>`:''}).join('');
  const labels=STATUS_ORDER.filter(s=>counts[s]>0).map(s=>`<span class="group-progress-label"><span style="width:7px;height:7px;border-radius:50%;background:${STATUS_COLOR[s]};display:inline-block"></span>${counts[s]} ${s}</span>`).join('');
  const rows=groupItems.length?groupItems.map(i=>`
    <div class="group-row" onclick="openModal('${i.id}')">
      <div style="flex:1;min-width:0">
        <div class="group-row-name">${esc(i.name)}</div>
        ${i.notes?`<div style="font-size:11px;color:var(--text2);margin-top:2px;line-height:1.4">${esc(i.notes)}</div>`:''}
        ${type==='owner'&&i.parent?`<div style="font-size:11px;color:var(--text3);margin-top:2px">${esc(i.parent)}</div>`:''}
      </div>
      <span class="group-row-meta">
        <span class="badge ${STATUS_CLASS[i.status]||''}">${esc(i.status)}</span>
        <span class="badge ${PRIORITY_CLASS[i.priority]||''}">${esc(i.priority)}</span>
        ${type==='page'&&i.owner?`<span class="owner-chip">${i.owner.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)}</span>`:''}
        ${i.screenshots&&i.screenshots.length?`<span style="font-size:11px;color:var(--text3)">📷${i.screenshots.length}</span>`:''}
      </span>
    </div>`).join(''):'<div style="padding:12px 16px;font-size:12px;color:var(--text3)">No entries yet</div>';
  const headerLeft=type==='owner'
    ?`<div style="display:flex;align-items:center;gap:10px"><span class="owner-chip" style="width:32px;height:32px;font-size:12px">${ini}</span><div><div class="group-card-title">${esc(groupKey)}</div><div class="group-card-sub">${total} item${total!==1?'s':''} · ${donePct}% done</div></div></div>`
    :`<div style="display:flex;align-items:center;gap:10px"><div><div class="group-card-title">${esc(groupKey)}</div><div class="group-card-sub">${total} entr${total!==1?'ies':'y'} · ${donePct}% done</div></div>${isOnHold?`<span class="badge-hold">⏸ On Hold</span>`:''}</div>`;
  return `<div class="group-card"${isOnHold?' style="opacity:0.8"':''}>
    <div class="group-card-header">${headerLeft}<span class="badge ${donePct===100?'s-done':'s-notstarted'}">${donePct}%</span></div>
    ${isOnHold?`<div class="card-hold-banner"><svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg> This page is on hold — no active work assigned</div>`:''}
    <div class="group-progress-wrap">
      <div class="group-progress-track">${segs||`<div style="width:100%;height:100%;background:var(--surface2)"></div>`}</div>
      <div class="group-progress-labels">${labels||'<span style="font-size:11px;color:var(--text3)">No entries</span>'}</div>
    </div>
    <div class="group-rows">${rows}</div>
  </div>`;
}

    <div class="empty-state">
      <div class="empty-icon">${isManageEmpty?'🗂️':'📋'}</div>
      <h3>${isManageEmpty?'Set up your dashboard structure first':'No entries yet'}</h3>
      <p>${isManageEmpty?'Go to <strong>Manage pages</strong> in the sidebar to define your parent pages and sub-pages before adding entries.':'Add your first entry to start tracking.'}</p>
      ${isManageEmpty
        ?`<button class="btn btn-dark" onclick="switchNav('manage',document.querySelector('.nav-item:last-child'))">Go to Manage pages</button>`
        :`<button class="btn btn-dark" onclick="openModal()">Add first entry</button>`
      }
    </div>`;
}

function switchNav(f,el){
  navFilter=f;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  if(el) el.classList.add('active');
  document.getElementById('page-title').textContent=NAV_LABELS[f]||'All pages';
  render();
}

function setView(v,el){
  view=v;
  document.querySelectorAll('.vt-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function exportCSV(){
  const headers=['Parent page','Sub-page','Status','Priority','Owner','Handoff','Screenshots','Update needed'];
  const rows=items.map(i=>[i.parent,i.name,i.status,i.priority,i.owner,i.handoff,(i.screenshots||[]).length,i.notes].map(v=>`"${(v||'').toString().replace(/"/g,'""')}"`).join(','));
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent([headers.join(','),...rows].join('\n'));
  a.download='jaba-ops.csv';a.click();
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeLightbox();closeModal();}
  if(e.key==='n'&&!e.target.matches('input,select,textarea')&&!document.getElementById('modal-bg').classList.contains('open'))openModal();
});

load();
</script>
</body>
</html>
